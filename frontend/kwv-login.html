<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인 - 대한민국 계절 근로자 통합 관리</title>
    <meta name="description" content="대한민국 계절 근로자 통합 관리 플랫폼에 로그인하세요.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="로그인 - 대한민국 계절 근로자 통합 관리">
    <meta property="og:description" content="외국인 계절근로자 통합 관리 플랫폼에 로그인하세요.">
    <meta property="og:image" content="/static/og-kwv.svg">
    <meta property="og:site_name" content="대한민국 계절 근로자 통합 관리">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127472;&#127479;</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            border-bottom: 3px solid #3b82f6;
            color: #1d4ed8;
            font-weight: 700;
        }
        .tab-btn:not(.active) {
            border-bottom: 3px solid transparent;
            color: #6b7280;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
    <!-- Language Selector -->
    <div class="fixed top-4 right-4 z-50">
        <select id="langSelector" onchange="changeLanguage(this.value)"
                class="px-3 py-2 bg-white/90 rounded-lg shadow-lg text-sm focus:outline-none cursor-pointer">
            <option value="en">English</option>
            <option value="ko">한국어</option>
            <option value="vi">Tiếng Việt</option>
            <option value="th">ภาษาไทย</option>
            <option value="tl">Pilipino</option>
        </select>
    </div>

    <div class="w-full max-w-lg">
        <div class="glass-card rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-6 text-center">
                <div id="loginLogoWrap" class="w-[200px] h-[200px] bg-white rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg">
                    <i class="fas fa-passport text-7xl text-blue-600" id="loginLogoIcon"></i>
                    <img id="loginLogoImg" src="" class="w-40 h-40 rounded-full object-contain hidden">
                </div>
                <h1 class="text-2xl font-bold text-white" data-i18n="title" id="loginTitle">Korea Working Visa</h1>
                <p class="text-blue-100 text-sm mt-1" data-i18n="subtitle" id="loginSubtitle">Seasonal Worker Portal</p>
            </div>

            <!-- Tab Selector -->
            <div class="flex border-b border-gray-200">
                <button type="button" class="tab-btn active flex-1 py-3 text-center text-sm" id="tabWorker" onclick="switchTab('worker')">
                    <i class="fas fa-user mr-1"></i> <span data-i18n="workerTab">Worker Login</span>
                </button>
                <button type="button" class="tab-btn flex-1 py-3 text-center text-sm" id="tabAdmin" onclick="switchTab('admin')">
                    <i class="fas fa-user-shield mr-1"></i> <span data-i18n="adminTab">Admin Login</span>
                </button>
            </div>

            <!-- Worker Login Tab -->
            <div id="workerPanel" class="p-6">
                <div class="text-center mb-4">
                    <p class="text-gray-600 text-sm" data-i18n="workerDesc">Sign in with your Google account to access the worker portal.</p>
                </div>

                <!-- Google Login Button (large, centered) -->
                <button type="button" onclick="window.location.href='/api/kwv/auth/google/start?mode=login'"
                    class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 font-semibold py-4 rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg border-2 border-gray-200 text-lg">
                    <svg width="24" height="24" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    <span data-i18n="googleLogin">Sign in with Google</span>
                </button>

                <div id="workerError" class="hidden mt-3 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm"></div>
                <div id="workerSuccess" class="hidden mt-3 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm"></div>

                <p class="text-center text-gray-500 text-xs mt-4" data-i18n="googleAutoRegister">
                    No account? You'll be automatically registered on first Google sign-in.
                </p>

                <!-- 비자안내 Section -->
                <div class="mt-6 pt-4 border-t border-gray-200">
                    <div class="border-2 border-blue-200 rounded-xl p-4 bg-blue-50/50 space-y-2">
                        <p class="text-sm font-semibold text-blue-700 mb-2 text-center">
                            <i class="fas fa-bullhorn mr-1"></i><span data-i18n="visaInfo">Visa Information</span>
                        </p>
                        <button type="button" onclick="window.location.href='/course-intro.html'"
                            class="w-full bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 text-white font-bold py-2.5 rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow">
                            <i class="fas fa-info-circle mr-2"></i><span data-i18n="visaGuide">Visa Guide</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Admin Login Tab -->
            <div id="adminPanel" class="p-6 hidden">
                <form id="adminLoginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <i class="fas fa-user mr-1"></i> <span data-i18n="adminName">Name</span>
                        </label>
                        <input type="text" id="adminName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <i class="fas fa-lock mr-1"></i> <span data-i18n="password">Password</span>
                        </label>
                        <input type="password" id="adminPassword" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" required>
                    </div>

                    <div id="adminError" class="hidden p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm"></div>
                    <div id="adminSuccess" class="hidden p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm"></div>

                    <button type="submit" id="adminLoginBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-lg hover:opacity-90 transition transform hover:scale-[1.02] active:scale-[0.98] shadow-lg">
                        <i class="fas fa-sign-in-alt mr-2"></i> <span data-i18n="adminLogin">Admin Login</span>
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-gray-600 text-sm">
                        <span data-i18n="noAdminAccount">Not registered yet?</span>
                        <a href="/kwv-admin-register.html" class="text-blue-600 font-medium hover:underline" data-i18n="adminRegister">Apply as Admin</a>
                    </p>
                </div>
            </div>

            <!-- MOU 쇼케이스 링크 -->
            <div class="px-6 pb-4 text-center">
                <a href="/kwv-mou-showcase.html" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-blue-600 transition">
                    <i class="fas fa-handshake"></i>
                    <span data-i18n="mouShowcase">MOU Partnerships</span>
                </a>
            </div>
        </div>

        <div class="text-center mt-6">
            <p class="text-white/80 text-sm">&copy; 2026 Korea Working Visa</p>
        </div>
    </div>

    <script>
        const API_BASE = '/api/kwv';

        const translations = {
            en: {
                title: 'Korea Working Visa',
                subtitle: 'Seasonal Worker Portal',
                workerTab: 'Foreign Worker Login',
                adminTab: 'Admin Login',
                workerDesc: 'Sign in with your Google account to access the worker portal.',
                googleLogin: 'Sign in with Google',
                googleAutoRegister: "No account? You'll be automatically registered on first Google sign-in.",
                adminName: 'Name',
                password: 'Password',
                adminLogin: 'Admin Login',
                noAdminAccount: 'Not registered yet?',
                adminRegister: 'Apply as Admin',
                visaInfo: 'Visa Information',
                visaGuide: 'Visa Guide',
                redirectingAdmin: 'Redirecting to Admin Dashboard...',
                redirectingApplicant: 'Redirecting to My Dashboard...',
                mouShowcase: 'MOU Partnerships'
            },
            ko: {
                title: '한국 워킹비자',
                subtitle: '계절근로자 포털',
                workerTab: '외국인 로그인',
                adminTab: '관리자 로그인',
                workerDesc: 'Google 계정으로 로그인하여 근로자 포털에 접속하세요.',
                googleLogin: 'Google로 로그인',
                googleAutoRegister: '계정이 없어도 Google 로그인 시 자동으로 가입됩니다.',
                adminName: '이름',
                password: '비밀번호',
                adminLogin: '관리자 로그인',
                noAdminAccount: '아직 등록하지 않으셨나요?',
                adminRegister: '관리자 가입 신청',
                visaInfo: '비자안내',
                visaGuide: '비자 안내',
                redirectingAdmin: '관리자 대시보드로 이동 중...',
                redirectingApplicant: '내 대시보드로 이동 중...',
                mouShowcase: 'MOU 협정 현황'
            },
            vi: {
                title: 'Visa Làm Việc Hàn Quốc',
                subtitle: 'Cổng Thông Tin Lao Động Thời Vụ',
                workerTab: 'Đăng nhập Người nước ngoài',
                adminTab: 'Đăng nhập Quản trị',
                workerDesc: 'Đăng nhập bằng tài khoản Google để truy cập cổng lao động.',
                googleLogin: 'Đăng nhập bằng Google',
                googleAutoRegister: 'Chưa có tài khoản? Bạn sẽ được tự động đăng ký khi đăng nhập Google lần đầu.',
                adminName: 'Họ tên',
                password: 'Mật khẩu',
                adminLogin: 'Đăng nhập Quản trị',
                noAdminAccount: 'Chưa đăng ký?',
                adminRegister: 'Đăng ký Quản trị viên',
                visaInfo: 'Thông tin Visa',
                visaGuide: 'Hướng dẫn Visa',
                mouShowcase: 'MOU Partnerships'
            },
            th: {
                title: 'วีซ่าทำงานเกาหลี',
                subtitle: 'พอร์ทัลแรงงานตามฤดูกาล',
                workerTab: 'เข้าสู่ระบบชาวต่างชาติ',
                adminTab: 'เข้าสู่ระบบผู้ดูแล',
                workerDesc: 'เข้าสู่ระบบด้วยบัญชี Google เพื่อเข้าถึงพอร์ทัลแรงงาน',
                googleLogin: 'เข้าสู่ระบบด้วย Google',
                googleAutoRegister: 'ยังไม่มีบัญชี? คุณจะถูกลงทะเบียนอัตโนมัติเมื่อเข้าสู่ระบบ Google ครั้งแรก',
                adminName: 'ชื่อ-นามสกุล',
                password: 'รหัสผ่าน',
                adminLogin: 'เข้าสู่ระบบผู้ดูแล',
                noAdminAccount: 'ยังไม่ได้ลงทะเบียน?',
                adminRegister: 'สมัครเป็นผู้ดูแล',
                visaInfo: 'ข้อมูลวีซ่า',
                visaGuide: 'คู่มือวีซ่า',
                mouShowcase: 'MOU Partnerships'
            },
            tl: {
                title: 'Korea Working Visa',
                subtitle: 'Portal ng Seasonal Worker',
                workerTab: 'Dayuhang Login',
                adminTab: 'Admin Login',
                workerDesc: 'Mag-sign in gamit ang Google account para ma-access ang worker portal.',
                googleLogin: 'Mag-sign in gamit ang Google',
                googleAutoRegister: 'Wala pang account? Awtomatikong mare-register sa unang Google sign-in.',
                adminName: 'Pangalan',
                password: 'Password',
                adminLogin: 'Admin Login',
                noAdminAccount: 'Hindi pa rehistrado?',
                adminRegister: 'Mag-apply bilang Admin',
                visaInfo: 'Impormasyon sa Visa',
                visaGuide: 'Gabay sa Visa',
                mouShowcase: 'MOU Partnerships'
            }
        };

        let currentLang = localStorage.getItem('kwv_language') || 'en';

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('kwv_language', lang);
            applyTranslations();
        }

        function applyTranslations() {
            const t = translations[currentLang] || translations.en;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            document.getElementById('langSelector').value = currentLang;
        }

        // Tab switching
        function switchTab(tab) {
            const workerPanel = document.getElementById('workerPanel');
            const adminPanel = document.getElementById('adminPanel');
            const tabWorker = document.getElementById('tabWorker');
            const tabAdmin = document.getElementById('tabAdmin');

            if (tab === 'worker') {
                workerPanel.classList.remove('hidden');
                adminPanel.classList.add('hidden');
                tabWorker.classList.add('active');
                tabAdmin.classList.remove('active');
            } else {
                workerPanel.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                tabWorker.classList.remove('active');
                tabAdmin.classList.add('active');
            }
        }

        function showAdminError(msg) {
            const el = document.getElementById('adminError');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('adminSuccess').classList.add('hidden');
        }

        function showAdminSuccess(msg) {
            const el = document.getElementById('adminSuccess');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('adminError').classList.add('hidden');
        }

        function redirectUser(user) {
            const t = translations[currentLang] || translations.en;
            sessionStorage.setItem('kwv_logged_in', 'true');
            sessionStorage.setItem('kwv_user', JSON.stringify(user));

            if (user.user_type === 'applicant') {
                const el = document.getElementById('workerSuccess');
                if (el) { el.textContent = t.redirectingApplicant || 'Redirecting to My Dashboard...'; el.classList.remove('hidden'); }
                setTimeout(() => { window.location.href = '/applicant/dashboard.html'; }, 1000);
            } else {
                showAdminSuccess(t.redirectingAdmin || 'Redirecting to Admin Dashboard...');
                setTimeout(() => { window.location.href = '/kwv-dashboard.html'; }, 1000);
            }
        }

        // Admin login form
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('adminName').value.trim();
            const password = document.getElementById('adminPassword').value;
            const loginBtn = document.getElementById('adminLoginBtn');

            if (!name || !password) {
                showAdminError('이름과 비밀번호를 입력해주세요.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 로그인 중...';

            try {
                const res = await fetch(`${API_BASE}/auth/admin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                sessionStorage.setItem('kwv_token', data.access_token);
                redirectUser(data.user);
            } catch (error) {
                showAdminError(error.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> 관리자 로그인';
            }
        });

        window.addEventListener('DOMContentLoaded', async () => {
            applyTranslations();

            // URL 파라미터로 탭 전환
            const params = new URLSearchParams(window.location.search);
            if (params.get('tab') === 'admin') {
                switchTab('admin');
            }

            // 시스템 설정 적용
            try {
                const res = await fetch(`${API_BASE}/settings`);
                if (res.ok) {
                    const settings = await res.json();
                    if (settings.system_title) {
                        document.title = settings.system_title + ' - 로그인';
                        document.getElementById('loginTitle').textContent = settings.system_title;
                    }
                    if (settings.system_subtitle) {
                        document.getElementById('loginSubtitle').textContent = settings.system_subtitle;
                    }
                    if (settings.logo_url) {
                        document.getElementById('loginLogoIcon').classList.add('hidden');
                        const img = document.getElementById('loginLogoImg');
                        img.src = settings.logo_url;
                        img.classList.remove('hidden');
                    }
                }
            } catch(e) { /* 설정 로드 실패시 기본값 유지 */ }
        });
    </script>
</body>
</html>
